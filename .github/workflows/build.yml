name: Build MindSafe Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: mindsafe-macos-intel
            binary_name: mindsafe

          # macOS Apple Silicon
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: mindsafe-macos-apple-silicon
            binary_name: mindsafe

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: mindsafe-windows
            binary_name: mindsafe.exe

          # Linux
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: mindsafe-linux
            binary_name: mindsafe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cd dist
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.binary_name }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\${{ matrix.binary_name }} dist\
          powershell Compress-Archive -Path dist\${{ matrix.binary_name }} -DestinationPath dist\${{ matrix.artifact_name }}.zip

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
