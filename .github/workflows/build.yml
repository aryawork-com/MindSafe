name: Build MindSafe Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ---------- macOS Universal ----------
          - os: macos-latest
            artifact_name: mindsafe-macos-universal
            binary_name: mindsafe

          # ---------- Windows ----------
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: mindsafe-windows
            binary_name: mindsafe.exe

          # ---------- Linux ----------
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: mindsafe-linux
            binary_name: mindsafe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ---------------- Linux dependencies ----------------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev \
            pkg-config

      # ---------------- Windows OpenSSL ----------------
      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install openssl -y
          echo "OPENSSL_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\Program Files\OpenSSL-Win64\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\Program Files\OpenSSL-Win64\include" >> $env:GITHUB_ENV

      # ---------------- macOS universal setup ----------------
      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      # ---------------- Build macOS universal ----------------
      - name: Build macOS universal
        if: runner.os == 'macOS'
        run: |
          cargo build --release --target x86_64-apple-darwin -j 2 --config profile.release.lto=false
          cargo build --release --target aarch64-apple-darwin -j 2 --config profile.release.lto=false

          mkdir -p target/universal
          lipo -create \
            target/x86_64-apple-darwin/release/mindsafe \
            target/aarch64-apple-darwin/release/mindsafe \
            -output target/universal/mindsafe

      # ---------------- Build Windows/Linux ----------------
      - name: Build (Windows/Linux)
        if: runner.os != 'macOS'
        run: |
          cargo build --release --target ${{ matrix.target }} -j 2 --config profile.release.lto=false

      # ---------------- Package macOS ----------------
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir dist
          cp target/universal/mindsafe dist/
          cd dist
          tar -czf ${{ matrix.artifact_name }}.tar.gz mindsafe

      # ---------------- Package Linux ----------------
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cd dist
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.binary_name }}

      # ---------------- Package Windows ----------------
      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\${{ matrix.binary_name }} dist\
          powershell Compress-Archive -Path dist\${{ matrix.binary_name }} -DestinationPath dist\${{ matrix.artifact_name }}.zip

      # ---------------- SHA256 Checksums ----------------
      - name: Generate SHA256
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            certutil -hashfile * SHA256 > SHA256SUMS.txt
          else
            shasum -a 256 * > SHA256SUMS.txt
          fi
        shell: bash

      # ---------------- Upload Release ----------------
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
